services:
  - type: web
    name: jansetu
    runtime: python
    pythonVersion: 3.12
    rootDir: JANSETU/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health 
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
